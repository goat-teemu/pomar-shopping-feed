name: Update Shopping Feed

on:
  schedule:
    - cron: '0 1 * * *'  # Joka päivä 01:00 UTC = 03:00 Helsinki-aikaa
  workflow_dispatch:       # Mahdollistaa myös manuaalisen ajon

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Run feed generator
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python3 google-shopping-feed/generate_feed.py
